<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HashPhone - 해시테이블로 만드는 전화번호부</title>
  <style>
/* Main CSS - Modern Dark Theme Hash Table Visualizer */

:root {
	--bg-primary: #0c0c18;
	--bg-secondary: #13132a;
	--bg-tertiary: #1a1a3a;
	--bg-elevated: #222248;
	--text-primary: #eeeef5;
	--text-secondary: #8888a8;
	--text-muted: #55557a;
	--accent: #6c5ce7;
	--accent-light: #a29bfe;
	--success: #00cec9;
	--error: #ff6b81;
	--warning: #feca57;
	--info: #74b9ff;
	--border: rgba(255, 255, 255, 0.06);
	--border-hover: rgba(255, 255, 255, 0.12);
	--radius-sm: 6px;
	--radius-md: 10px;
	--radius-lg: 14px;
	--transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
}

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

html,
body {
	width: 100%;
	height: 100%;
	font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
	background-color: var(--bg-primary);
	color: var(--text-primary);
	overflow: hidden;
	-webkit-font-smoothing: antialiased;
}

body {
	display: flex;
	flex-direction: column;
}

#app {
	display: flex;
	flex-direction: column;
	height: 100vh;
	overflow: hidden;
}

/* ── Header ── */
.control-panel {
	display: flex;
	align-items: center;
	gap: 1.25rem;
	padding: 0.5rem 1.5rem;
	background: var(--bg-secondary);
	border-bottom: 1px solid var(--border);
	flex-shrink: 0;
	flex-wrap: wrap;
}

.app-title {
	display: flex;
	align-items: baseline;
	gap: 0.625rem;
	margin-right: auto;
}

.app-title h1 {
	font-size: 1.0625rem;
	font-weight: 700;
	white-space: nowrap;
	letter-spacing: -0.01em;
	background: linear-gradient(135deg, var(--success), var(--accent-light));
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
	background-clip: text;
}

.subtitle {
	font-size: 0.6875rem;
	color: var(--text-muted);
	white-space: nowrap;
}

.controls {
	display: flex;
	align-items: center;
	gap: 0.75rem;
	flex-wrap: wrap;
}

.control-group {
	display: flex;
	align-items: center;
	gap: 0.35rem;
}

.control-group label {
	font-size: 0.625rem;
	color: var(--text-muted);
	font-weight: 600;
	white-space: nowrap;
	text-transform: uppercase;
	letter-spacing: 0.05em;
}

/* ── Inputs ── */
input[type="text"],
input[type="tel"],
input[type="number"],
select {
	padding: 0.4375rem 0.625rem;
	background-color: var(--bg-tertiary);
	border: 1px solid var(--border);
	border-radius: var(--radius-sm);
	color: var(--text-primary);
	font-family: inherit;
	font-size: 0.8125rem;
	transition: all var(--transition);
	outline: none;
}

input:hover,
select:hover {
	border-color: var(--border-hover);
}

input[type="text"]:focus,
input[type="tel"]:focus,
input[type="number"]:focus,
select:focus {
	border-color: var(--accent);
	box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.15);
}

input::placeholder {
	color: var(--text-muted);
}

.control-panel select {
	padding: 0.25rem 0.4rem;
	font-size: 0.75rem;
	min-width: 46px;
	background-color: var(--bg-tertiary);
}

#speed-slider {
	width: 64px;
	accent-color: var(--accent);
}

#speed-value {
	font-size: 0.625rem;
	color: var(--text-muted);
	min-width: 22px;
	font-family: 'Courier New', monospace;
	font-weight: 600;
}

/* ── Buttons ── */
.button-group {
	display: flex;
	gap: 0.4rem;
	flex-wrap: wrap;
}

button {
	padding: 0.375rem 0.75rem;
	background-color: var(--bg-tertiary);
	border: 1px solid var(--border);
	color: var(--text-primary);
	border-radius: var(--radius-sm);
	font-family: inherit;
	font-size: 0.75rem;
	font-weight: 600;
	cursor: pointer;
	transition: all var(--transition);
	white-space: nowrap;
}

button:hover:not(:disabled) {
	background-color: var(--accent);
	border-color: var(--accent);
	transform: translateY(-1px);
	box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25);
}

button:active:not(:disabled) {
	transform: translateY(0);
}

button:disabled {
	opacity: 0.3;
	cursor: not-allowed;
}

button.danger,
button.btn-danger {
	color: var(--error);
	border-color: rgba(255, 107, 129, 0.15);
}

button.danger:hover:not(:disabled),
button.btn-danger:hover:not(:disabled) {
	background-color: var(--error);
	border-color: var(--error);
	color: #fff;
	box-shadow: 0 4px 12px rgba(255, 107, 129, 0.25);
}

/* ── Main Layout ── */
.main-content {
	display: grid;
	grid-template-columns: 5fr 7fr;
	grid-template-rows: 1fr 1fr;
	gap: 1px;
	background-color: var(--border);
	overflow: hidden;
	flex: 1;
	min-height: 0;
}

.contact-panel {
	grid-row: 1 / -1;
}

/* ── Contact Panel ── */
.contact-panel {
	display: flex;
	flex-direction: column;
	gap: 0.625rem;
	overflow-y: auto;
	padding: 1rem 1.125rem;
	background-color: var(--bg-primary);
}

.contact-panel::-webkit-scrollbar { width: 4px; }
.contact-panel::-webkit-scrollbar-track { background: transparent; }
.contact-panel::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

.contact-panel h2 {
	font-size: 0.6875rem;
	font-weight: 600;
	color: var(--text-muted);
	text-transform: uppercase;
	letter-spacing: 0.08em;
}

.contact-form .form-row {
	display: flex;
	gap: 0.4rem;
}

.contact-form .form-row input {
	flex: 1;
	min-width: 0;
}

.form-actions {
	display: flex;
	gap: 0.3rem;
	margin-top: 0.3rem;
}

.form-actions button {
	flex: 1;
	font-size: 0.6875rem;
	padding: 0.4rem 0.375rem;
}

.form-actions button[type="submit"] {
	background: linear-gradient(135deg, var(--accent), #7c6cf0);
	border-color: transparent;
	color: #fff;
}

.form-actions button[type="submit"]:hover:not(:disabled) {
	box-shadow: 0 4px 16px rgba(108, 92, 231, 0.35);
	transform: translateY(-1px);
}

.contact-list {
	display: flex;
	flex-direction: column;
	gap: 0.3rem;
}

.contact-card {
	display: flex;
	align-items: center;
	gap: 0.5rem;
	background-color: var(--bg-secondary);
	border: 1px solid var(--border);
	border-radius: var(--radius-sm);
	padding: 0.5rem 0.625rem;
	transition: all var(--transition);
	cursor: pointer;
}

.contact-card:hover {
	border-color: var(--accent);
	background-color: var(--bg-tertiary);
	transform: translateX(2px);
}

.contact-avatar {
	width: 30px;
	height: 30px;
	border-radius: 7px;
	background: linear-gradient(135deg, var(--accent), var(--success));
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 0.75rem;
	font-weight: 700;
	color: #fff;
	flex-shrink: 0;
}

.contact-info {
	flex: 1;
	display: flex;
	flex-direction: column;
	gap: 0.05rem;
	min-width: 0;
}

.contact-name {
	font-size: 0.8125rem;
	font-weight: 600;
}

.contact-phone {
	font-size: 0.6875rem;
	color: var(--text-secondary);
	font-family: 'Courier New', monospace;
}

.contact-bucket {
	font-size: 0.5625rem;
	color: var(--text-muted);
	background-color: var(--bg-tertiary);
	padding: 0.15rem 0.35rem;
	border-radius: 3px;
	flex-shrink: 0;
	font-family: 'Courier New', monospace;
	font-weight: 600;
}

.empty-contacts {
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	padding: 2rem 1rem;
	color: var(--text-muted);
	text-align: center;
	gap: 0.25rem;
}

.empty-icon {
	font-size: 1.75rem;
	opacity: 0.25;
	margin-bottom: 0.375rem;
}

.empty-contacts p {
	font-size: 0.75rem;
}

.empty-hint {
	font-size: 0.6875rem;
	opacity: 0.5;
}

/* ── Bucket Panel (right top) ── */
.bucket-panel {
	display: flex;
	flex-direction: column;
	gap: 0.5rem;
	padding: 0.75rem 1.125rem;
	background-color: var(--bg-primary);
	overflow-y: auto;
}

.bucket-panel::-webkit-scrollbar { width: 4px; }
.bucket-panel::-webkit-scrollbar-track { background: transparent; }
.bucket-panel::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

.bucket-panel h2,
.hash-panel h2 {
	font-size: 0.6875rem;
	font-weight: 600;
	color: var(--text-muted);
	text-transform: uppercase;
	letter-spacing: 0.08em;
}

.bucket-panel h2 small,
.hash-panel h2 small,
.hash-title small,
.hash-key small,
.stat-label small {
	font-weight: 400;
	color: var(--text-muted);
	opacity: 0.6;
	font-size: 0.85em;
	text-transform: none;
	letter-spacing: 0;
	margin-left: 0.25em;
}

/* ── Hash Panel (right bottom) ── */
.hash-panel {
	display: flex;
	flex-direction: column;
	padding: 0.75rem 1.125rem;
	background-color: var(--bg-primary);
	overflow-y: auto;
}

.hash-panel::-webkit-scrollbar { width: 4px; }
.hash-panel::-webkit-scrollbar-track { background: transparent; }
.hash-panel::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

/* ── Notification Toast ── */
.notification {
	position: fixed;
	top: 0.625rem;
	left: 50%;
	transform: translateX(-50%) translateY(-120%);
	z-index: 100;
	padding: 0.5rem 1rem;
	border-radius: var(--radius-md);
	font-size: 0.75rem;
	font-weight: 500;
	transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
	max-width: 480px;
	text-align: center;
	backdrop-filter: blur(16px);
	border: 1px solid var(--border);
}

.notification.show {
	transform: translateX(-50%) translateY(0);
}

.notification.success {
	background: rgba(0, 206, 201, 0.12);
	color: var(--success);
	border-color: rgba(0, 206, 201, 0.2);
}

.notification.error {
	background: rgba(255, 107, 129, 0.12);
	color: var(--error);
	border-color: rgba(255, 107, 129, 0.2);
}

.notification.warning {
	background: rgba(254, 202, 87, 0.12);
	color: var(--warning);
	border-color: rgba(254, 202, 87, 0.2);
}

.notification.info {
	background: rgba(116, 185, 255, 0.12);
	color: var(--info);
	border-color: rgba(116, 185, 255, 0.2);
}

/* ── Responsive ── */
@media (max-width: 768px) {
	.main-content {
		grid-template-columns: 1fr;
	}

	.control-panel {
		padding: 0.5rem 1rem;
	}

	.contact-panel,
	.bucket-panel,
	.hash-panel {
		padding: 0.75rem;
	}

	.contact-panel {
		grid-row: auto;
	}
}

@media (max-width: 480px) {
	.button-group,
	.contact-actions {
		flex-direction: column;
	}

	button,
	.contact-actions button {
		width: 100%;
	}
}

</style>
  <style>
/* Animations - Keyframe Definitions */

@keyframes fadeIn {
	from { opacity: 0; transform: scale(0.92); }
	to { opacity: 1; transform: scale(1); }
}

@keyframes slideIn {
	from { opacity: 0; transform: translateX(-16px); }
	to { opacity: 1; transform: translateX(0); }
}

@keyframes bounce {
	0% { transform: translateY(0); }
	30% { transform: translateY(-8px); }
	60% { transform: translateY(0); }
	80% { transform: translateY(-3px); }
	100% { transform: translateY(0); }
}

@keyframes shake {
	0% { transform: translateX(0); }
	20% { transform: translateX(-6px); }
	40% { transform: translateX(6px); }
	60% { transform: translateX(-3px); }
	80% { transform: translateX(3px); }
	100% { transform: translateX(0); }
}

@keyframes pulse {
	0%, 100% { transform: scale(1); opacity: 1; }
	50% { transform: scale(1.08); opacity: 0.85; }
}

@keyframes glow {
	0% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.2); }
	50% { box-shadow: 0 0 12px 4px rgba(108, 92, 231, 0.1); }
	100% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0); }
}

@keyframes hashFlow {
	0% { opacity: 0; transform: translateY(-8px); }
	15% { opacity: 1; transform: translateY(0); }
	85% { opacity: 1; transform: translateY(0); }
	100% { opacity: 0; transform: translateY(8px); }
}

/* Utility Classes */
.animate-fade-in { animation: fadeIn 250ms ease-out forwards; }
.animate-slide-in { animation: slideIn 250ms ease-out forwards; }
.animate-bounce { animation: bounce 500ms ease-in-out; }
.animate-shake { animation: shake 350ms ease-in-out; }
.animate-pulse { animation: pulse 2s ease-in-out infinite; }
.animate-glow { animation: glow 2s ease-in-out infinite; }
.animate-hash-flow { animation: hashFlow 700ms ease-out forwards; }

/* Stagger */
.animate-stagger > * { animation: fadeIn 250ms ease-out forwards; }
.animate-stagger > *:nth-child(1) { animation-delay: 0ms; }
.animate-stagger > *:nth-child(2) { animation-delay: 40ms; }
.animate-stagger > *:nth-child(3) { animation-delay: 80ms; }
.animate-stagger > *:nth-child(4) { animation-delay: 120ms; }
.animate-stagger > *:nth-child(5) { animation-delay: 160ms; }
.animate-stagger > *:nth-child(n + 6) { animation-delay: 200ms; }

/* Delay Utilities */
.delay-100 { animation-delay: 100ms; }
.delay-200 { animation-delay: 200ms; }
.delay-300 { animation-delay: 300ms; }
.delay-500 { animation-delay: 500ms; }

</style>
  <style>
/* Visualizer CSS - Hash Table Visualization */

/* ── Bucket Array ── */
.bucket-array {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
	grid-auto-rows: 1fr;
	gap: 0.375rem;
	overflow-x: auto;
	padding: 0.75rem 0;
	align-content: start;
}

.bucket-array::-webkit-scrollbar { height: 4px; }
.bucket-array::-webkit-scrollbar-track { background: transparent; }
.bucket-array::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

/* ── Bucket ── */
.bucket {
	display: flex;
	flex-direction: column;
	gap: 0.2rem;
	background-color: var(--bg-secondary);
	border: 1px solid var(--border);
	border-radius: var(--radius-sm);
	padding: 0.4rem;
	transition: all var(--transition);
	position: relative;
	min-height: 80px;
}

.bucket:hover {
	border-color: var(--accent);
	box-shadow: 0 0 16px rgba(108, 92, 231, 0.12);
}

.bucket.filled {
	border-color: rgba(0, 206, 201, 0.2);
	background-color: rgba(0, 206, 201, 0.04);
}

.bucket.collision {
	border-color: rgba(255, 107, 129, 0.3);
}

.bucket.collision::after {
	content: "!";
	position: absolute;
	top: -6px;
	right: -6px;
	width: 16px;
	height: 16px;
	background: var(--error);
	border-radius: 50%;
	font-size: 0.5625rem;
	font-weight: 700;
	color: #fff;
	display: flex;
	align-items: center;
	justify-content: center;
	animation: pulse 2s ease-in-out infinite;
}

/* ── Bucket Index ── */
.bucket-index {
	text-align: center;
	font-size: 0.5625rem;
	color: var(--text-muted);
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 0.05em;
	padding-top: 0.35rem;
	border-top: 1px solid var(--border);
	margin-top: auto;
	font-family: 'Courier New', monospace;
}

.bucket:not(:has(.chain-node)) .bucket-index {
	font-size: 0.625rem;
	color: var(--text-muted);
	opacity: 0.5;
}

/* ── Chain Nodes ── */
.chain-container {
	display: flex;
	flex-direction: column;
	gap: 0.35rem;
	flex: 1;
	overflow-y: auto;
	min-height: 0;
}

.chain-container::-webkit-scrollbar { width: 3px; }
.chain-container::-webkit-scrollbar-track { background: transparent; }
.chain-container::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

.chain-node {
	background-color: var(--bg-tertiary);
	border: 1px solid var(--border);
	border-radius: 4px;
	padding: 0.3rem;
	font-size: 0.625rem;
	transition: all var(--transition);
	animation: slideIn 250ms ease-out forwards;
	overflow: hidden;
	text-overflow: ellipsis;
}

.bucket.filled .chain-node {
	background-color: rgba(0, 0, 0, 0.3);
	border-color: rgba(255, 255, 255, 0.08);
}

.chain-node:hover {
	border-color: var(--accent);
	transform: scale(1.04);
	box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.chain-node-key {
	font-family: 'Courier New', monospace;
	color: var(--success);
	font-weight: 600;
	word-break: break-all;
	margin-bottom: 0.2rem;
}

.chain-node-arrow {
	color: var(--text-muted);
	font-size: 0.5625rem;
	margin: 0.1rem 0;
}

.chain-node-value {
	color: var(--text-primary);
	font-size: 0.625rem;
	word-break: break-all;
}

.empty-label {
	color: var(--text-muted);
	font-size: 0.625rem;
	text-align: center;
	display: block;
	opacity: 0.35;
}

.node-key {
	color: var(--success);
	font-weight: 600;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	display: block;
	font-size: 0.625rem;
}

.node-value {
	color: var(--text-secondary);
	font-size: 0.5625rem;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	display: block;
	font-family: 'Courier New', monospace;
}

.chain-arrow {
	color: var(--text-muted);
	font-size: 0.5rem;
	text-align: center;
	display: block;
	opacity: 0.5;
}

/* ── Hash Computation Panel ── */
.hash-computation {
	background-color: var(--bg-secondary);
	border: 1px solid var(--border);
	border-radius: var(--radius-sm);
	padding: 0.75rem;
}

.hash-title {
	font-size: 0.6875rem;
	font-weight: 600;
	color: var(--text-muted);
	text-transform: uppercase;
	letter-spacing: 0.05em;
	margin-bottom: 0.5rem;
}

.hash-placeholder {
	font-size: 0.75rem;
	color: var(--text-muted);
	opacity: 0.4;
	padding: 0.5rem 0;
}

.hash-key {
	font-family: 'Courier New', monospace;
	font-size: 0.75rem;
	color: var(--accent-light);
	margin-bottom: 0.5rem;
	font-weight: 500;
}

.hash-steps-container {
	display: flex;
	flex-direction: column;
	gap: 0.3rem;
	margin-bottom: 0.5rem;
}

.hash-step {
	display: flex;
	align-items: center;
	gap: 0.5rem;
	background-color: var(--bg-tertiary);
	border: 1px solid var(--border);
	border-radius: 4px;
	padding: 0.35rem 0.5rem;
	font-family: 'Courier New', monospace;
	font-size: 0.6875rem;
	transition: all var(--transition);
}

.hash-step:hover {
	border-color: var(--accent);
}

.step-char {
	color: var(--warning);
	font-weight: 700;
	min-width: 1.25rem;
	text-align: center;
}

.step-detail {
	color: var(--text-secondary);
	flex: 1;
}

.step-running {
	color: var(--success);
	font-weight: 600;
}

.hash-result {
	padding: 0.4rem 0.5rem;
	background: rgba(108, 92, 231, 0.08);
	border: 1px solid rgba(108, 92, 231, 0.15);
	border-radius: 4px;
}

.hash-formula {
	font-family: 'Courier New', monospace;
	font-size: 0.75rem;
	color: var(--text-secondary);
}

.hash-formula strong {
	color: var(--accent-light);
	font-size: 0.875rem;
}

/* ── Stats Panel ── */
.stats-panel {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 0.35rem 1rem;
}

.stat-item {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 0.25rem 0.5rem;
	background-color: var(--bg-secondary);
	border-radius: 4px;
	border: 1px solid var(--border);
}

.stat-label {
	font-size: 0.6875rem;
	color: var(--text-muted);
}

.stat-value {
	font-size: 0.8125rem;
	font-weight: 700;
	color: var(--text-primary);
	font-family: 'Courier New', monospace;
}

.stat-value.load-factor.low {
	color: var(--success);
}

.stat-value.load-factor.medium {
	color: var(--warning);
}

.stat-value.load-factor.high {
	color: var(--error);
}

/* ── Load Factor Bar ── */
.load-factor-bar {
	background-color: var(--bg-tertiary);
	border: 1px solid var(--border);
	border-radius: 3px;
	height: 6px;
	margin-top: 0.5rem;
	overflow: hidden;
}

.load-factor-fill {
	height: 100%;

  <script>
class HashTable {
	#buckets;
	#size;
	#count;
	#hashSteps; // 시각화용 해시 계산 과정 저장

	constructor(size = 7) {
		this.#size = size;
		this.#count = 0;
		this.#buckets = Array.from({ length: size }, () => []);
		this.#hashSteps = [];
	}

	_hash(key) {
		this.#hashSteps = [];
		let hash = 0;
		const keyStr = String(key).toLowerCase();
		for (let i = 0; i < keyStr.length; i++) {
			const charCode = keyStr.charCodeAt(i);
			hash = (hash + charCode * (i + 1)) % this.#size;
			this.#hashSteps.push({
				char: keyStr[i],
				charCode,
				position: i + 1,
				product: charCode * (i + 1),
				runningHash: hash,
			});
		}
		return hash;
	}

	getHashSteps() {
		return [...this.#hashSteps];
	}

	insert(key, value) {
		const index = this._hash(key);
		const bucket = this.#buckets[index];
		const existing = bucket.findIndex((item) => item.key === key);
		const collision = bucket.length > 0 && existing === -1;

		if (existing !== -1) {
			const oldValue = bucket[existing].value;
			bucket[existing].value = value;
			return {
				index,
				collision: false,
				updated: true,
				oldValue,
				chain: [...bucket],
				hashSteps: this.getHashSteps(),
			};
		} else {
			bucket.push({ key, value });
			this.#count++;
			return {
				index,
				collision,
				updated: false,
				chain: [...bucket],
				hashSteps: this.getHashSteps(),
			};
		}
	}

	search(key) {
		const index = this._hash(key);
		const bucket = this.#buckets[index];
		let steps = 0;
		for (const item of bucket) {
			steps++;
			if (item.key === key) {
				return {
					found: true,
					value: item.value,
					steps,
					index,
					hashSteps: this.getHashSteps(),
				};
			}
		}
		return {
			found: false,
			value: null,
			steps,
			index,
			hashSteps: this.getHashSteps(),
		};
	}

	delete(key) {
		const index = this._hash(key);
		const bucket = this.#buckets[index];
		const pos = bucket.findIndex((item) => item.key === key);
		if (pos !== -1) {
			const removed = bucket.splice(pos, 1)[0];
			this.#count--;
			return {
				deleted: true,
				index,
				item: removed,
				hashSteps: this.getHashSteps(),
			};
		}
		return { deleted: false, index, hashSteps: this.getHashSteps() };
	}

	getAll() {
		const items = [];
		this.#buckets.forEach((bucket, index) => {
			bucket.forEach((item) => {
				items.push({ ...item, index });
			});
		});
		return items;
	}

	getBuckets() {
		return this.#buckets.map((bucket, index) => ({
			index,
			items: [...bucket],
			isEmpty: bucket.length === 0,
			hasCollision: bucket.length > 1,
		}));
	}

	getLoadFactor() {
		return this.#count / this.#size;
	}

	getSize() {
		return this.#size;
	}
	getCount() {
		return this.#count;
	}

	resize(newSize) {
		const oldItems = this.getAll();
		this.#size = newSize;
		this.#count = 0;
		this.#buckets = Array.from({ length: newSize }, () => []);
		oldItems.forEach((item) => this.insert(item.key, item.value));
	}

	clear() {
		this.#buckets = Array.from({ length: this.#size }, () => []);
		this.#count = 0;
	}
}

</script>
  <script>
class ContactBook {
	#hashTable;

	constructor(hashTable) {
		this.#hashTable = hashTable;
	}

	addContact(name, phone) {
		if (!name || !phone) {
			return { success: false, error: "이름과 전화번호를 모두 입력하세요." };
		}
		const result = this.#hashTable.insert(name, phone);
		return { success: true, ...result };
	}

	findContact(name) {
		if (!name) {
			return { success: false, error: "검색할 이름을 입력하세요." };
		}
		const result = this.#hashTable.search(name);
		return { success: true, ...result };
	}

	removeContact(name) {
		if (!name) {
			return { success: false, error: "삭제할 이름을 입력하세요." };
		}
		const result = this.#hashTable.delete(name);
		return { success: true, ...result };
	}

	getAllContacts() {
		return this.#hashTable.getAll();
	}

	getStats() {
		return {
			total: this.#hashTable.getCount(),
			tableSize: this.#hashTable.getSize(),
			loadFactor: this.#hashTable.getLoadFactor(),
			buckets: this.#hashTable.getBuckets(),
			collisionCount: this.#hashTable.getBuckets().filter((b) => b.hasCollision)
				.length,
		};
	}

	getHashTable() {
		return this.#hashTable;
	}
}

</script>
  <script>
class AnimationEngine {
	#speed;
	#queue;
	#isPlaying;
	#isPaused;

	constructor() {
		this.#speed = 1;
		this.#queue = [];
		this.#isPlaying = false;
		this.#isPaused = false;
	}

	setSpeed(speed) {
		this.#speed = Math.max(0.25, Math.min(3, speed));
	}

	getSpeed() {
		return this.#speed;
	}

	getDuration(baseDuration) {
		return baseDuration / this.#speed;
	}

	async animate(element, keyframes, duration, options = {}) {
		if (!element) return;
		const animation = element.animate(keyframes, {
			duration: this.getDuration(duration),
			easing: options.easing || "ease-in-out",
			fill: options.fill || "forwards",
			...options,
		});
		return animation.finished;
	}

	async fadeIn(element, duration = 300) {
		if (!element) return;
		element.style.display = "";
		return this.animate(
			element,
			[
				{ opacity: 0, transform: "scale(0.8)" },
				{ opacity: 1, transform: "scale(1)" },
			],
			duration,
		);
	}

	async fadeOut(element, duration = 300) {
		if (!element) return;
		await this.animate(
			element,
			[
				{ opacity: 1, transform: "scale(1)" },
				{ opacity: 0, transform: "scale(0.8)" },
			],
			duration,
		);
	}

	async highlight(element, color, duration = 500) {
		if (!element) return;
		const originalBg = element.style.backgroundColor;
		return this.animate(
			element,
			[
				{ backgroundColor: color, transform: "scale(1.05)" },
				{ backgroundColor: color, transform: "scale(1.05)", offset: 0.7 },
				{ backgroundColor: originalBg || "transparent", transform: "scale(1)" },
			],
			duration,
		);
	}

	async bounce(element, duration = 400) {
		if (!element) return;
		return this.animate(
			element,
			[
				{ transform: "translateY(0)" },
				{ transform: "translateY(-10px)" },
				{ transform: "translateY(0)" },
				{ transform: "translateY(-5px)" },
				{ transform: "translateY(0)" },
			],
			duration,
		);
	}

	async shake(element, duration = 400) {
		if (!element) return;
		return this.animate(
			element,
			[
				{ transform: "translateX(0)" },
				{ transform: "translateX(-8px)" },
				{ transform: "translateX(8px)" },
				{ transform: "translateX(-4px)" },
				{ transform: "translateX(4px)" },
				{ transform: "translateX(0)" },
			],
			duration,
		);
	}

	async slideIn(element, direction = "left", duration = 400) {
		if (!element) return;
		const transforms = {
			left: ["translateX(-30px)", "translateX(0)"],
			right: ["translateX(30px)", "translateX(0)"],
			top: ["translateY(-30px)", "translateY(0)"],
			bottom: ["translateY(30px)", "translateY(0)"],
		};
		const [from, to] = transforms[direction] || transforms.left;
		return this.animate(
			element,
			[
				{ opacity: 0, transform: from },
				{ opacity: 1, transform: to },
			],
			duration,
		);
	}

	async delay(ms) {
		return new Promise((resolve) => setTimeout(resolve, this.getDuration(ms)));
	}

	queue(animationFn) {
		this.#queue.push(animationFn);
	}

	async playAll() {
		this.#isPlaying = true;
		this.#isPaused = false;
		for (const fn of this.#queue) {
			if (!this.#isPlaying) break;
			while (this.#isPaused) {
				await new Promise((r) => setTimeout(r, 100));
			}
			await fn();
		}
		this.#queue = [];
		this.#isPlaying = false;
	}

	pause() {
		this.#isPaused = true;
	}
	resume() {
		this.#isPaused = false;
	}
	stop() {
		this.#isPlaying = false;
		this.#isPaused = false;
		this.#queue = [];
	}
	isPlaying() {
		return this.#isPlaying;
	}
}

</script>
  <script>
class Visualizer {
	#container;
	#bucketContainer;
	#hashPanel;
	#animationEngine;
	#statsPanel;

	constructor(container, animationEngine) {
		this.#container = container;
		this.#animationEngine = animationEngine;
		this.#bucketContainer = document.querySelector(".bucket-array");
		this.#hashPanel = document.querySelector(".hash-computation");
		this.#statsPanel = document.querySelector(".stats-panel");
	}

	renderBuckets(buckets) {
		if (!this.#bucketContainer) return;
		this.#bucketContainer.innerHTML = buckets
			.map(
				(bucket) => `
      <div class="bucket ${bucket.hasCollision ? "collision" : ""} ${!bucket.isEmpty ? "filled" : ""}" data-index="${bucket.index}">
        <div class="chain-container">
          ${
						bucket.items.length === 0
							? '<span class="empty-label">-</span>'
							: bucket.items
									.map(
										(item, i) => `
              <div class="chain-node" data-key="${item.key}" title="Key: ${item.key} / Value: ${item.value}" style="animation-delay: ${i * 0.05}s">
                <span class="node-key">${item.key}</span>
                <span class="node-value">${item.value}</span>
              </div>
            `,
									)
									.join("")
					}
        </div>
        <div class="bucket-index">${bucket.index}</div>
      </div>
    `,
			)
			.join("");
	}

	async showHashComputation(key, hashSteps, finalIndex) {
		if (!this.#hashPanel) return;

		this.#hashPanel.innerHTML = `
      <div class="hash-title">해시 함수 <small>Hash Function</small></div>
      <div class="hash-key">키 <small>Key</small>: "${key}"</div>
      <div class="hash-steps-container"></div>
      <div class="hash-result">
        <span class="hash-formula">hash("${key}") = <strong>${finalIndex}</strong></span>
      </div>
    `;

		const stepsContainer = this.#hashPanel.querySelector(
			".hash-steps-container",
		);

		for (let i = 0; i < hashSteps.length; i++) {
			const step = hashSteps[i];
			const stepEl = document.createElement("div");
			stepEl.className = "hash-step";
			stepEl.innerHTML = `
        <span class="step-char">'${step.char}'</span>
        <span class="step-detail">코드: ${step.charCode} × 위치: ${step.position} = ${step.product}</span>
        <span class="step-running">누적: ${step.runningHash}</span>
      `;
			stepsContainer.appendChild(stepEl);
			await this.#animationEngine.fadeIn(stepEl, 200);
			await this.#animationEngine.delay(100);
		}

		const resultEl = this.#hashPanel.querySelector(".hash-result");
		await this.#animationEngine.bounce(resultEl, 400);
	}

	async highlightBucket(index, color = "#4ecdc4") {
		const bucket = this.#bucketContainer?.querySelector(
			`[data-index="${index}"]`,
		);
		if (!bucket) return;

		bucket.style.borderColor = color;
		bucket.style.boxShadow = `0 0 15px ${color}40`;
		await this.#animationEngine.bounce(bucket, 400);
	}

	async showInsert(index, key, _value, collision) {
		await this.highlightBucket(index, collision ? "#ff6b6b" : "#4ecdc4");

		if (collision) {
			const bucket = this.#bucketContainer?.querySelector(
				`[data-index="${index}"]`,
			);
			if (bucket) {
				await this.#animationEngine.shake(bucket, 400);
			}
		}

		const node = this.#bucketContainer?.querySelector(
			`[data-index="${index}"] [data-key="${key}"]`,
		);
		if (node) {
			await this.#animationEngine.fadeIn(node, 300);
		}
	}

	async showSearch(index, found, _steps) {
		const color = found ? "#00d2d3" : "#ff6b6b";
		await this.highlightBucket(index, color);

		if (!found) {
			const bucket = this.#bucketContainer?.querySelector(
				`[data-index="${index}"]`,
			);
			if (bucket) {
				await this.#animationEngine.shake(bucket, 400);
			}
		}
	}

	async showDelete(index) {
		await this.highlightBucket(index, "#ff9f43");
		await this.#animationEngine.delay(300);
	}

	updateStats(stats) {
		if (!this.#statsPanel) return;
		const loadFactorPercent = (stats.loadFactor * 100).toFixed(1);
		const loadFactorClass =
			stats.loadFactor > 0.75
				? "high"
				: stats.loadFactor > 0.5
					? "medium"
					: "low";

		this.#statsPanel.innerHTML = `
      <div class="stat-item">
        <span class="stat-label">항목 <small>Entry</small></span>
        <span class="stat-value">${stats.total}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">테이블 크기</span>
        <span class="stat-value">${stats.tableSize}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">로드 팩터</span>
        <span class="stat-value load-factor ${loadFactorClass}">${loadFactorPercent}%</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">충돌 버킷</span>
        <span class="stat-value">${stats.collisionCount}</span>
      </div>
    `;
	}

	resetHighlights() {
		this.#bucketContainer?.querySelectorAll(".bucket").forEach((el) => {
			el.style.borderColor = "";
			el.style.boxShadow = "";
		});
	}

	clearHashPanel() {
		if (this.#hashPanel) {
			this.#hashPanel.innerHTML = `
        <div class="hash-title">해시 함수 <small>Hash Function</small></div>
        <div class="hash-placeholder">연산을 수행하면 여기에 과정이 표시됩니다</div>
      `;
		}
	}
}

</script>
  <script>
class App {
	#hashTable;
	#contactBook;
	#visualizer;
	#animationEngine;
	#elements;

	constructor() {
		this.#hashTable = new HashTable(7);
		this.#contactBook = new ContactBook(this.#hashTable);
		this.#animationEngine = new AnimationEngine();
	}

	init() {
		this.#elements = {
			form: document.getElementById("contact-form"),
			nameInput: document.getElementById("input-name"),
			phoneInput: document.getElementById("input-phone"),
			searchBtn: document.getElementById("btn-search"),
			deleteBtn: document.getElementById("btn-delete"),
			contactList: document.getElementById("contact-list"),
			notification: document.getElementById("notification"),
			visualizerPanel: document.querySelector(".bucket-panel"),
			sizeSelect: document.getElementById("table-size"),
			speedSlider: document.getElementById("speed-slider"),
			speedValue: document.getElementById("speed-value"),
			resetBtn: document.getElementById("btn-reset"),
			sampleBtn: document.getElementById("btn-sample"),
		};

		this.#visualizer = new Visualizer(
			this.#elements.visualizerPanel,
			this.#animationEngine,
		);

		this.bindEvents();
		this.updateView();
	}

	bindEvents() {
		this.#elements.form?.addEventListener("submit", (e) => {
			e.preventDefault();
			this.handleInsert();
		});

		this.#elements.searchBtn?.addEventListener("click", () =>
			this.handleSearch(),
		);
		this.#elements.deleteBtn?.addEventListener("click", () =>
			this.handleDelete(),
		);

		this.#elements.sizeSelect?.addEventListener("change", (e) => {
			const newSize = parseInt(e.target.value, 10);
			this.handleResize(newSize);
		});

		this.#elements.speedSlider?.addEventListener("input", (e) => {
			const speed = parseFloat(e.target.value);
			this.#animationEngine.setSpeed(speed);
			if (this.#elements.speedValue) {
				this.#elements.speedValue.textContent = `${speed}x`;
			}
		});

		this.#elements.resetBtn?.addEventListener("click", () =>
			this.handleReset(),
		);
		this.#elements.sampleBtn?.addEventListener("click", () =>
			this.handleSampleData(),
		);

		document.addEventListener("keydown", (e) => {
			if (e.key === "Enter" && e.ctrlKey) {
				this.handleInsert();
			}
		});
	}

	async handleInsert() {
		const name = this.#elements.nameInput?.value.trim();
		const phone = this.#elements.phoneInput?.value.trim();

		if (!name || !phone) {
			this.showNotification("이름과 전화번호를 모두 입력하세요.", "error");
			return;
		}

		this.#visualizer.resetHighlights();
		const result = this.#contactBook.addContact(name, phone);

		if (result.success) {
			await this.#visualizer.showHashComputation(
				name,
				result.hashSteps,
				result.index,
			);
			this.updateView();
			await this.#visualizer.showInsert(
				result.index,
				name,
				phone,
				result.collision,
			);

			if (result.updated) {
				this.showNotification(`"${name}" 연락처가 업데이트되었습니다.`, "info");
			} else if (result.collision) {
				this.showNotification(
					`충돌 발생! "${name}"이(가) 버킷 ${result.index}에 체이닝되었습니다.`,
					"warning",
				);
			} else {
				this.showNotification(
					`"${name}"이(가) 버킷 ${result.index}에 저장되었습니다.`,
					"success",
				);
			}

			this.#elements.nameInput.value = "";
			this.#elements.phoneInput.value = "";
			this.#elements.nameInput.focus();
		} else {
			this.showNotification(result.error, "error");
		}
	}

	async handleSearch() {
		const name = this.#elements.nameInput?.value.trim();
		if (!name) {
			this.showNotification("검색할 이름을 입력하세요.", "error");
			return;
		}

		this.#visualizer.resetHighlights();
		const result = this.#contactBook.findContact(name);

		if (result.success) {
			await this.#visualizer.showHashComputation(
				name,
				result.hashSteps,
				result.index,
			);
			await this.#visualizer.showSearch(
				result.index,
				result.found,
				result.steps,
			);

			if (result.found) {
				this.showNotification(
					`"${name}" 발견! 전화번호: ${result.value} (${result.steps}단계)`,
					"success",
				);
				this.#elements.phoneInput.value = result.value;
			} else {
				this.showNotification(
					`"${name}"을(를) 찾을 수 없습니다. (${result.steps}단계 탐색)`,
					"error",
				);
			}
		}
	}

	async handleDelete() {
		const name = this.#elements.nameInput?.value.trim();
		if (!name) {
			this.showNotification("삭제할 이름을 입력하세요.", "error");
			return;
		}

		this.#visualizer.resetHighlights();
		const result = this.#contactBook.removeContact(name);

		if (result.success) {
			await this.#visualizer.showHashComputation(
				name,
				result.hashSteps,
				result.index,
			);

			if (result.deleted) {
				await this.#visualizer.showDelete(result.index);
				this.updateView();
				this.showNotification(`"${name}"이(가) 삭제되었습니다.`, "success");
				this.#elements.nameInput.value = "";
				this.#elements.phoneInput.value = "";
			} else {
				this.showNotification(`"${name}"을(를) 찾을 수 없습니다.`, "error");
			}
		}
	}

	handleResize(newSize) {
		this.#hashTable.resize(newSize);
		this.updateView();
		this.showNotification(
			`테이블 크기가 ${newSize}으로 변경되었습니다. 모든 항목이 재해싱되었습니다.`,
			"info",
		);
	}

	handleReset() {
		this.#hashTable.clear();
		this.#visualizer.clearHashPanel();
		this.updateView();
		this.showNotification("테이블이 초기화되었습니다.", "info");
	}

	async handleSampleData() {
		const samples = [
			{ name: "홍길동", phone: "010-1234-5678" },
			{ name: "김철수", phone: "010-2345-6789" },
			{ name: "이영희", phone: "010-3456-7890" },
			{ name: "박민수", phone: "010-4567-8901" },
			{ name: "정수진", phone: "010-5678-9012" },
		];

		for (const { name, phone } of samples) {
			const result = this.#contactBook.addContact(name, phone);
			if (result.success) {
				this.updateView();
				await this.#animationEngine.delay(300);
			}
		}
		this.showNotification("샘플 데이터 5개가 추가되었습니다.", "success");
	}

	updateView() {
		const stats = this.#contactBook.getStats();
		this.#visualizer.renderBuckets(stats.buckets);
		this.#visualizer.updateStats(stats);
		this.renderContactList();
	}

	renderContactList() {
		const contacts = this.#contactBook.getAllContacts();
		if (!this.#elements.contactList) return;

		if (contacts.length === 0) {
			this.#elements.contactList.innerHTML = `
        <div class="empty-contacts">
          <span class="empty-icon">📱</span>
          <p>연락처가 없습니다</p>
          <p class="empty-hint">위 폼에서 연락처를 추가하세요</p>
        </div>
      `;
			return;
		}

		this.#elements.contactList.innerHTML = contacts
			.map(
				(c) => `
      <div class="contact-card" data-name="${c.key}">
        <div class="contact-avatar">${c.key[0]}</div>
        <div class="contact-info">
          <span class="contact-name">${c.key}</span>
          <span class="contact-phone">${c.value}</span>
        </div>
        <span class="contact-bucket" title="버킷 ${c.index}">#${c.index}</span>
      </div>
    `,
			)
			.join("");

		this.#elements.contactList
			.querySelectorAll(".contact-card")
			.forEach((card) => {
				card.addEventListener("click", () => {
					const name = card.dataset.name;
					this.#elements.nameInput.value = name;
					const result = this.#contactBook.findContact(name);
					if (result.found) {
						this.#elements.phoneInput.value = result.value;
					}
				});
			});
	}

	showNotification(message, type = "info") {
		const el = this.#elements.notification;
		if (!el) return;

		const icons = { success: "✅", error: "❌", warning: "⚠️", info: "ℹ️" };
		el.innerHTML = `<span class="notif-icon">${icons[type] || ""}</span> ${message}`;
		el.className = `notification ${type} show`;

		setTimeout(() => {
			el.classList.remove("show");
		}, 3000);
	}

}

document.addEventListener("DOMContentLoaded", () => {
	const app = new App();
	app.init();
});

</script>
</body>
</html>
